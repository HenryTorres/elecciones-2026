<div class="pyramid-container">
    <h2 class="pyramid-title">Top 3 Candidatos</h2>

    <div class="pyramid">
        <div class="pyramid-row first-place">
            @if (candidates[0]) {
            <app-candidate-card [candidate]="candidates[0]" [rank]="1" [voteDifference]=0
                [percentageDifference]=0></app-candidate-card>
            }
        </div>

        <div class="pyramid-row second-place">
            @if (candidates[1]) {
            <app-candidate-card [candidate]="candidates[1]" [rank]="2" [voteDifference]="voteDifference1to2()"
                [percentageDifference]="percentageDifference1to2()"></app-candidate-card>
            }
        </div>

        <div class="pyramid-row third-place">
            @if (candidates[2]) {
            <app-candidate-card [candidate]="candidates[2]" [rank]="3" [voteDifference]="voteDifference2to3()"
                [percentageDifference]="percentageDifference2to3()"></app-candidate-card>
            }
        </div>
    </div>
</div>
